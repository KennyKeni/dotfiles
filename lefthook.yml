pre-push:
  commands:
    generate-routing-references:
      run: |
        task skills:routing:generate

        set -- \
          packages/agent-skills/personal/codex-subagent-routing/references/codex-quality.md \
          packages/agent-skills/personal/codex-subagent-routing/references/cursor-grok.md \
          packages/agent-skills/personal/codex-subagent-routing/references/opencode-grok.md \
          packages/agent-skills/personal/codex-subagent-routing/references/opencode-ollama.md

        if ! git diff --quiet -- "$@"; then
          git diff -- "$@"
          echo "Generated routing references changed. Review and commit them before pushing." >&2
          exit 1
        fi
