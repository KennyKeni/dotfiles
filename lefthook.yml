pre-commit:
  commands:
    generate-subagent-skills:
      run: |
        set -e
        task skills:subagents:generate
        task skills:subagents:check
        git add -- \
          packages/agent-skills/personal/codex-subagent-routing/SKILL.md \
          packages/agent-skills/personal/codex-subagent-routing/references \
          packages/agent-skills/personal/sidekick/SKILL.md \
          packages/agent-skills/personal/sidekick/agents/openai.yaml \
          packages/agent-skills/personal/sidekick/references
